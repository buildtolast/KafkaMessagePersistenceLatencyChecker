x-kafka-common: &kafka-common
  image: apache/kafka:3.9.1
  environment: &kafka-env
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    KAFKA_MESSAGE_MAX_BYTES: 3145728
    KAFKA_REPLICA_FETCH_MAX_BYTES: 3670016
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
  healthcheck: &kafka-health
    test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
    interval: 10s
    timeout: 10s
    retries: 12

services:
  kafka1:
    <<: *kafka-common
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
  kafka2:
    <<: *kafka-common
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092
  kafka3:
    <<: *kafka-common
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9092

  topic-init:
    image: apache/kafka:3.9.1
    depends_on:
      kafka1: { condition: service_healthy }
      kafka2: { condition: service_healthy }
      kafka3: { condition: service_healthy }
    environment:
      CHAIN_LENGTH: "20"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "for i in $$(seq -w 1 $$CHAIN_LENGTH); do
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka1:9092 --create
      --if-not-exists --topic topic-$$i --partitions 3 --replication-factor 3
      --config min.insync.replicas=2 --config max.message.bytes=3145728
      --config retention.bytes=2147483648 --config retention.ms=1800000;
      done"

  mongo1:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck: &mongo-health
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ping:1}).ok' | grep -q 1"]
      interval: 10s
      timeout: 10s
      retries: 12
  mongo2:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck: *mongo-health
  mongo3:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck: *mongo-health

  mongo-init:
    image: mongo:7
    depends_on:
      mongo1: { condition: service_healthy }
      mongo2: { condition: service_healthy }
      mongo3: { condition: service_healthy }
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mongosh --host mongo1 --quiet --eval '
      try { rs.status().ok } catch (e) {
        rs.initiate({_id: \"rs0\", members: [
          {_id: 0, host: \"mongo1:27017\"},
          {_id: 1, host: \"mongo2:27017\"},
          {_id: 2, host: \"mongo3:27017\"}]}) }';
      until mongosh --host mongo1 --quiet --eval 'db.hello().isWritablePrimary || quit(1)' >/dev/null 2>&1; do sleep 2; done;
      mongosh --host mongo1 --quiet --eval '
      db.getSiblingDB(\"claimcheck\").large_payloads.createIndex(
        {createdAt: 1}, {expireAfterSeconds: 120})'"

  producer:
    build: ./producer-service
    depends_on:
      topic-init: { condition: service_completed_successfully }
      mongo-init: { condition: service_completed_successfully }
    environment: &app-env
      KAFKA_BOOTSTRAP: kafka1:9092,kafka2:9092,kafka3:9092
      MONGO_URI: mongodb://mongo1:27017,mongo2:27017,mongo3:27017/claimcheck?replicaSet=rs0&w=majority
      CHAIN_LENGTH: "20"
      LOAD_TICK_MILLIS: "2000"
    healthcheck: &app-health
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 12

  consumer1: &consumer
    build: ./consumer-service
    depends_on:
      topic-init: { condition: service_completed_successfully }
      mongo-init: { condition: service_completed_successfully }
    environment: *app-env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 12
  consumer2: *consumer
  consumer3: *consumer

  dashboard:
    build: ./dashboard-service
    ports:
      - "8085:8085"
    depends_on:
      producer: { condition: service_healthy }
    environment:
      DASHBOARD_TARGETS: http://producer:8090,http://consumer1:8091,http://consumer2:8091,http://consumer3:8091
      DASHBOARD_CONSUMER_TARGETS: http://consumer1:8091,http://consumer2:8091,http://consumer3:8091
