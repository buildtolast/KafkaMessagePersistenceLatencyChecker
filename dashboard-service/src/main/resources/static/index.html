<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim-Check Latency Dashboard</title>
    <style>
        body { background: #111418; color: #e6e6e6; font-family: sans-serif; margin: 0; padding: 20px; }
        header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        #live-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        #live-dot.on { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        button { background: #2a2f36; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        #hero { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; align-items: center; }
        .path-card { background: #1b2027; border: 1px solid #2a2f36; padding: 20px; border-radius: 8px; text-align: center; }
        .big { font-size: 2.2rem; font-weight: bold; }
        #delta-badge { text-align: center; }
        #delta-badge .big { font-size: 2.5rem; color: #ff6b6b; }
        section { margin-bottom: 30px; }
        .seg-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .seg-label { width: 100px; font-size: 0.8rem; font-weight: bold; }
        .seg-bar { flex-grow: 1; display: flex; height: 24px; background: #2a2f36; border-radius: 4px; overflow: hidden; }
        .seg { height: 100%; }
        #mongo-storage { font-size: 0.85rem; color: #888; text-align: right; margin-top: 10px; }
        footer { border-top: 1px solid #2a2f36; padding-top: 10px; font-size: 0.8rem; color: #666; }
        .inline-color { color: #4dabf7; }
        .cc-color { color: #f59f00; }
    </style>
</head>
<body>
    <header>
        <h1>Claim-Check Latency Dashboard</h1>
        <span id="live-dot"></span>
        <button id="pause-btn">Pause</button>
    </header>

    <section id="hero">
        <div class="path-card">
            <h2 class="inline-color">INLINE</h2>
            <div class="big" id="inline-p95">–</div>
            <div id="inline-rate">0 req/s</div>
        </div>
        <div id="delta-badge">
            <div class="big" id="delta-ms">–</div>
            <div id="delta-pct">–</div>
            <div style="font-size: 0.8rem; color: #888;">claim-check overhead</div>
        </div>
        <div class="path-card">
            <h2 class="cc-color">CLAIM_CHECK</h2>
            <div class="big" id="cc-p95">–</div>
            <div id="cc-rate">0 req/s</div>
        </div>
    </section>

    <section>
        <canvas id="lat-chart" height="90"></canvas>
    </section>

    <section id="segments">
        <div class="seg-row">
            <span class="seg-label">INLINE</span>
            <div class="seg-bar" id="seg-inline"></div>
        </div>
        <div class="seg-row">
            <span class="seg-label">CLAIM_CHECK</span>
            <div class="seg-bar" id="seg-cc"></div>
        </div>
        <div id="mongo-storage">Mongo: – docs, – GB</div>
    </section>

    <footer id="cluster-strip">Cluster Status: Connected</footer>

    <script src="vendor/chart.umd.js"></script>
    <script src="app.js"></script>
</body>
</html>
